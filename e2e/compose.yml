services:
  avahi:
    profiles: ["bridge"]
    build:
      context: ..
      dockerfile: e2e/avahi.Dockerfile
    networks: [mdns]
    cap_add: [NET_RAW]
    healthcheck:
      test: ["CMD-SHELL", "avahi-browse -t -p --no-db-lookup _http._tcp 2>/dev/null | grep -q _http._tcp"]
      interval: 2s
      timeout: 5s
      retries: 10
      start_period: 3s

  sut:
    depends_on:
      avahi:
        condition: service_healthy
    profiles: ["bridge"]
    build:
      context: ..
      dockerfile: e2e/sut.Dockerfile
      args:
        GO_VERSION: "${GO_VERSION:-1.24}"
    networks: [mdns]
    cap_add: [NET_RAW]

networks:
  mdns:
    driver: bridge
